<body>
<div id="root"></div>

<!-- Zichtbare shell terwijl JS laadt — React vervangt #root zodra klaar -->
<div id="app-shell" aria-hidden="true" style="
  position:fixed;inset:0;z-index:99999;
  background:#1b1b1b;color:#f9f0dd;
  font-family:ui-sans-serif,system-ui,-apple-system,sans-serif;
  display:flex;flex-direction:column;
  transition:opacity .25s ease;
">
  <!-- Navbar -->
  <div style="height:60px;display:flex;align-items:center;padding:0 24px;border-bottom:1px solid #3a3a3a;flex-shrink:0;">
    <span style="font-weight:700;font-size:1.1rem;color:#c9a97a;letter-spacing:.04em;">MK</span>
  </div>
  <!-- Hero -->
  <div style="flex:1;display:flex;align-items:center;padding:0 clamp(20px,6vw,80px);max-width:1100px;width:100%;margin:0 auto;">
    <div>
      <p style="margin:0 0 8px;font-size:.85rem;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:#c9a97a;">Full Stack Developer</p>
      <h1 style="margin:0 0 16px;font-size:clamp(2rem,5vw,3.4rem);font-weight:700;line-height:1.1;color:#f9f0dd;">Hoi, ik ben Manon</h1>
      <p style="margin:0;font-size:1.05rem;color:#c6c1b5;max-width:480px;line-height:1.6;">Ik maak complexe dingen helder, en bouw ze.</p>
    </div>
  </div>
</div>
<script type="module" src="/src/main.jsx"></script>

<!-- Hidden forms so Netlify detects them at build time (required for React SPAs) -->
<form name="contact" data-netlify="true" netlify-honeypot="bot-field" hidden>
  <input type="text" name="name" />
  <input type="email" name="email" />
  <textarea name="message"></textarea>
  <input name="bot-field" />
</form>
<form name="newsletter" data-netlify="true" hidden>
  <input type="email" name="email" />
</form>
</body>
